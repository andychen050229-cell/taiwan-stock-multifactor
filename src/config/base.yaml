# 股市趨勢預測導向決策輔助系統 — 基礎設定檔
random_seed: 42

project:
  name: "stock_prediction_system"
  version: "0.1.0"
  description: "股市趨勢預測導向決策輔助系統 — Phase 1 資料地基"

data:
  parquet_dir: "選用資料集/parquet"
  tables:
    companies: "companies.parquet"
    stock_prices: "stock_prices.parquet"
    income_stmt: "income_stmt.parquet"
    stock_text: "stock_text.parquet"
    stock_text_lite: "stock_text_lite.parquet"
  ohlcv: "stock_prices_ohlcv.parquet"     # OHLCV 補齊後的檔案（FinMind）
  date_range:
    start: "2023-03-01"
    end: "2025-03-31"

preprocessing:
  stock_prices:
    ffill_max_days: 5
    min_trading_days: 60
    price_change_alert_pct: 9.5  # 接近漲跌停 ±10%
  ex_dividend:
    verification_steps: 5
    max_gap_tolerance_pct: 0.5
    rsi_anomaly_window: 14
    rsi_anomaly_threshold: 10  # RSI 一日變化 > 10 視為異常
  text:
    min_length: 10
    minhash_num_perm: 128
    minhash_threshold: 0.8  # Jaccard 相似度 > 0.8 視為重複
    max_duplicate_rate: 0.30
  financial:
    pit_deadlines:        # 台灣 IFRS 法定申報期限（保守估計）
      Q1: "05-15"         # Q1 → 5/15
      Q2: "08-14"         # Q2 → 8/14
      Q3: "11-14"         # Q3 → 11/14
      Q4: "+1-03-31"      # Q4 → 隔年 3/31
  leakage_detection:
    future_keyword_patterns:
      - "future_"
      - "_forward"
      - "_next"
      - "_tomorrow"
    max_train_test_psi: 0.25  # PSI > 0.25 表示分佈飄移

features:
  pillars:
    - name: "趨勢與價格"
      prefix: "trend_"
    - name: "基本面"
      prefix: "fund_"
    - name: "估值"
      prefix: "val_"
    - name: "事件與敘事"
      prefix: "event_"
    - name: "風險與機制"
      prefix: "risk_"
  selection:
    mi_threshold_percentile: 60    # 保留前 60% 特徵（約 26 個），避免過度篩選
    vif_max: 10
    rfecv_min_features: 20

labeling:
  thresholds:
    1: 0.005              # D+1: ±0.5%
    5: 0.015              # D+5: ±1.5%
    20: 0.040             # D+20: ±4.0%
  use_dynamic_threshold: false
  vol_window: 60

ohlcv_fetch:
  batch_size: 50
  rate_limit_per_hour: 580   # with token (600 max, 留餘量)
  rate_limit_no_token: 280   # without token (300 max)
  max_retries: 3
  delay_between_stocks: 0.3

model:
  # Phase 2 主力模型
  engines:
    - "lightgbm"
    - "xgboost"
  horizons: [1, 5, 20]  # D+1, D+5, D+20
  quality_gate_auc: 0.52
  # Optuna 超參數搜尋
  optuna:
    n_trials: 50
    timeout: 600         # 每個 horizon 最多 10 分鐘
    early_stopping_rounds: 50
  # LightGBM 預設參數（Optuna 會覆寫）
  lightgbm:
    objective: "multiclass"
    num_class: 3
    metric: "multi_logloss"
    verbosity: -1
    n_estimators: 500
    learning_rate: 0.05
    num_leaves: 63
    max_depth: 8
    min_child_samples: 50
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
  # XGBoost 預設參數
  xgboost:
    objective: "multi:softprob"
    num_class: 3
    eval_metric: "mlogloss"
    verbosity: 0
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    min_child_weight: 50
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0

backtest:
  # 資料約 503 交易日，用 expanding window
  mode: "expanding"       # expanding | rolling
  initial_train_days: 252 # 初始訓練期 = 1 年
  test_window: 63         # 測試期 = 1 季
  step: 63                # 每季重新訓練
  embargo: 20             # 防止標籤洩漏的緩衝天數
  min_samples: 1000
  # 策略參數
  strategy:
    top_k_pct: 0.1        # 買入前 10% 的股票
    rebalance: "fold"     # 每個 fold 重新調整
    position_weight: "equal"  # equal | score_weighted

cost_model:
  standard:
    commission: 0.001425
    discount: 1.0
    tax: 0.003
    slippage: 0.001
  discount:
    commission: 0.001425
    discount: 0.28
    tax: 0.003
    slippage: 0.0005
  conservative:
    commission: 0.001425
    discount: 1.0
    tax: 0.003
    slippage: 0.002

logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level:<8} | {module}:{function}:{line} | {message}"
  rotation: "10 MB"
  retention: "30 days"

paths:
  logs: "logs"
  outputs: "outputs"
  figures: "outputs/figures"
  mlruns: "outputs/mlruns"
  reports: "outputs/reports"
