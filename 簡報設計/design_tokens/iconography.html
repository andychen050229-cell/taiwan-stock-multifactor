<!doctype html>

.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:10px}
.cell{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border:1px solid var(--gl-border);border-radius:8px;background:#fff}
.cell svg{width:20px;height:20px;stroke:#0f172a;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cell span{font-family:var(--mono);font-size:9px;color:var(--gl-text-3)}
</style></head><body>
