<!doctype html>
<html lang="zh-TW"><head><meta charset="utf-8"><title>Colors · Core</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_base.css">
<style>
.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border:1px solid var(--gl-border);border-radius:10px;overflow:hidden;background:#fff}
.sw .chip{height:60px}
.sw .meta{padding:8px 10px}
.sw .name{font-size:12px;font-weight:700;color:var(--gl-text)}
.sw .hex{font-family:var(--mono);font-size:10px;color:var(--gl-text-3);letter-spacing:0.03em;margin-top:2px}
</style></head><body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:#fafbfc;border-bottom:1px solid var(--gl-border)"></div><div class="meta"><div class="name">bg · canvas</div><div class="hex">#FAFBFC</div></div></div>
  <div class="sw"><div class="chip" style="background:#ffffff;border-bottom:1px solid var(--gl-border)"></div><div class="meta"><div class="name">surface</div><div class="hex">#FFFFFF</div></div></div>
  <div class="sw"><div class="chip" style="background:#f1f5f9"></div><div class="meta"><div class="name">subtle</div><div class="hex">#F1F5F9</div></div></div>
  <div class="sw"><div class="chip" style="background:#e2e8f0"></div><div class="meta"><div class="name">border</div><div class="hex">#E2E8F0</div></div></div>
  <div class="sw"><div class="chip" style="background:#cbd5e1"></div><div class="meta"><div class="name">border-str</div><div class="hex">#CBD5E1</div></div></div>
  <div class="sw"><div class="chip" style="background:#0f172a"></div><div class="meta"><div class="name">text · primary</div><div class="hex">#0F172A</div></div></div>
  <div class="sw"><div class="chip" style="background:#475569"></div><div class="meta"><div class="name">text-2</div><div class="hex">#475569</div></div></div>
  <div class="sw"><div class="chip" style="background:#94a3b8"></div><div class="meta"><div class="name">text-3</div><div class="hex">#94A3B8</div></div></div>
  <div class="sw"><div class="chip" style="background:linear-gradient(180deg,#0f1419,#1a2332)"></div><div class="meta"><div class="name">sidebar · dark</div><div class="hex">#0F1419 → #1A2332</div></div></div>
  <div class="sw"><div class="chip" style="background:#f8fafc"></div><div class="meta"><div class="name">tint</div><div class="hex">#F8FAFC</div></div></div>
</div>
</body></html>
