<!doctype html>
<html lang="zh-TW"><head><meta charset="utf-8"><title>Badges & Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_base.css">
<style>
body{padding:20px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.lab{font-family:var(--mono);font-size:10px;color:var(--gl-text-3);letter-spacing:0.08em;text-transform:uppercase;min-width:76px}
.bdg{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;font-family:var(--mono);letter-spacing:0.04em}
.dot{width:6px;height:6px;border-radius:50%}
.b-ok{background:rgba(16,185,129,0.1);color:#065f46;border:1px solid rgba(16,185,129,0.3)}
.b-live{background:rgba(6,182,212,0.1);color:#0e7490;border:1px solid rgba(6,182,212,0.3)}
.b-warn{background:rgba(245,158,11,0.1);color:#92400e;border:1px solid rgba(245,158,11,0.3)}
.b-fail{background:rgba(244,63,94,0.1);color:#9f1239;border:1px solid rgba(244,63,94,0.3)}
.b-neutral{background:var(--gl-subtle);color:var(--gl-text-2);border:1px solid var(--gl-border)}
.b-pri{background:rgba(37,99,235,0.1);color:#1d4ed8;border:1px solid rgba(37,99,235,0.3)}
.live .dot{background:#06b6d4;box-shadow:0 0 0 3px rgba(6,182,212,0.2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style></head><body>
<div class="row"><span class="lab">status</span>
  <span class="bdg b-ok"><span class="dot" style="background:#10b981"></span>PASS</span>
  <span class="bdg b-live live"><span class="dot"></span>LIVE</span>
  <span class="bdg b-warn"><span class="dot" style="background:#f59e0b"></span>WATCH</span>
  <span class="bdg b-fail"><span class="dot" style="background:#f43f5e"></span>FAIL</span>
  <span class="bdg b-neutral">DRAFT</span>
</div>
<div class="row"><span class="lab">phase</span>
  <span class="bdg b-pri">Phase 1</span>
  <span class="bdg b-pri">Phase 2</span>
  <span class="bdg b-pri">Phase 6 ★</span>
  <span class="bdg b-neutral">v11.5.17</span>
</div>
<div class="row"><span class="lab">metric</span>
  <span class="bdg b-ok">AUC 0.6455</span>
  <span class="bdg b-ok">IC 0.0254</span>
  <span class="bdg b-warn">drawdown −18.3%</span>
  <span class="bdg b-neutral">N = 1,623</span>
</div>
</body></html>
