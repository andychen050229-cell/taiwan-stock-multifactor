<!doctype html>
<html lang="zh-TW"><head><meta charset="utf-8"><title>Spacing Scale</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_base.css">
<style>
body{padding:20px 28px}
.grid{display:grid;grid-template-columns:80px 1fr 80px;column-gap:16px;row-gap:8px;align-items:center}
.token{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gl-text)}
.bar{background:linear-gradient(90deg,#2563eb,#7c3aed);height:14px;border-radius:4px}
.val{font-family:var(--mono);font-size:10px;color:var(--gl-text-3);text-align:right}
</style></head><body>
<div class="grid">
  <div class="token">space-1</div><div class="bar" style="width:4px"></div><div class="val">4px · 0.25rem</div>
  <div class="token">space-2</div><div class="bar" style="width:8px"></div><div class="val">8px · 0.5rem</div>
  <div class="token">space-3</div><div class="bar" style="width:12px"></div><div class="val">12px · 0.75rem</div>
  <div class="token">space-4</div><div class="bar" style="width:16px"></div><div class="val">16px · 1rem</div>
  <div class="token">space-6</div><div class="bar" style="width:24px"></div><div class="val">24px · 1.5rem</div>
  <div class="token">space-8</div><div class="bar" style="width:32px"></div><div class="val">32px · 2rem</div>
  <div class="token">space-12</div><div class="bar" style="width:48px"></div><div class="val">48px · 3rem</div>
  <div class="token">space-16</div><div class="bar" style="width:64px"></div><div class="val">64px · 4rem</div>
</div>
</body></html>
