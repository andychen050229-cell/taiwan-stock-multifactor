<!doctype html>
<html lang="zh-TW"><head><meta charset="utf-8"><title>Alerts & Callouts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_base.css">
<style>
body{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.alert{display:flex;gap:12px;padding:12px 16px;border-radius:10px;border:1px solid;font-size:13px;line-height:1.5}
.alert .icn{font-family:var(--mono);font-size:12px;font-weight:700;flex-shrink:0;width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff}
.alert b{font-weight:700}
.a-info{background:rgba(37,99,235,0.06);border-color:rgba(37,99,235,0.2);color:#1e40af}
.a-info .icn{background:#2563eb}
.a-ok{background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.2);color:#065f46}
.a-ok .icn{background:#10b981}
.a-warn{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.2);color:#92400e}
.a-warn .icn{background:#f59e0b}
.a-danger{background:rgba(244,63,94,0.06);border-color:rgba(244,63,94,0.2);color:#9f1239}
.a-danger .icn{background:#f43f5e}
</style></head><body>
<div class="alert a-info"><span class="icn">i</span><div><b>Phase 6 已完成：</b>本系統通過嚴格時序驗證，AUC 0.6455，無前視偏差。</div></div>
<div class="alert a-ok"><span class="icn">✓</span><div><b>PASS：</b>所有 4 個支柱 LOPO 測試均顯示顯著退化（Δ &lt; 0），證明支柱組合穩健。</div></div>
<div class="alert a-warn"><span class="icn">!</span><div><b>Watch：</b>2024-08 shock 期間回撤 −18.3%，已觸發 risk_pillar 熔斷機制。</div></div>
<div class="alert a-danger"><span class="icn">×</span><div><b>請注意：</b>本系統為研究原型，實盤前須加入滑價、手續費與流動性檢驗。</div></div>
</body></html>
