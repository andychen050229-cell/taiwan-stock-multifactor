<!doctype html>
<html lang="zh-TW"><head><meta charset="utf-8"><title>Brand · Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_base.css">
<style>
body{padding:20px 24px;display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center}
.mark-lg{width:72px;height:72px}
.lock{display:flex;flex-direction:column;gap:8px}
.lock .wm{display:flex;align-items:center;gap:12px}
.lock .wm img{width:32px;height:32px}
.hero-title{font-size:18px;font-weight:800;letter-spacing:-0.02em;background:linear-gradient(135deg,#0f172a 0%,#2563eb 55%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-family:var(--mono);font-size:10px;color:var(--gl-text-3);letter-spacing:0.12em;text-transform:uppercase}
.lock-dark{background:linear-gradient(180deg,#0f1419,#1a2332);padding:14px 16px;border-radius:12px;display:inline-flex;align-items:center;gap:10px}
.lock-dark img{width:26px;height:26px}
.lock-dark .wt{color:#fff;font-weight:700;font-size:13px}
.lock-dark .wd{color:#94a3b8;font-family:var(--mono);font-size:9px;letter-spacing:0.1em}
</style></head><body>
<img class="mark-lg" src="../assets/logo.svg" alt="mark">
<div class="lock">
  <div class="wm"><img src="../assets/logo.svg" alt=""><div><div class="hero-title">台股多因子預測系統</div><div class="sub">TW Multi-Factor · v11.5.17</div></div></div>
  <div class="lock-dark"><img src="../assets/logo.svg" alt=""><div><div class="wt">台股多因子預測系統</div><div class="wd">MULTI-FACTOR · v11.5.17</div></div></div>
</div>
</body></html>
