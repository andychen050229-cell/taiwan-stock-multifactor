<!doctype html>
<html lang="zh-TW"><head><meta charset="utf-8"><title>Colors · Pillars</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_base.css">
<style>
.wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pillar{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid}
.dot{width:10px;height:10px;border-radius:50%}
.pname{font-family:var(--mono);font-size:12px;font-weight:700}
.pmeta{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--gl-text-3)}
</style></head><body>
<div class="wrap">
  <div class="pillar" style="background:rgba(37,99,235,0.08);border-color:rgba(37,99,235,0.35)"><span class="dot" style="background:#2563eb"></span><span class="pname" style="color:#2563eb">trend</span><span class="pmeta">13 · 趨勢</span></div>
  <div class="pillar" style="background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.35)"><span class="dot" style="background:#10b981"></span><span class="pname" style="color:#10b981">fund</span><span class="pmeta">15 · 基本面</span></div>
  <div class="pillar" style="background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.35)"><span class="dot" style="background:#f59e0b"></span><span class="pname" style="color:#d97706">val</span><span class="pmeta">5 · 估值</span></div>
  <div class="pillar" style="background:rgba(244,63,94,0.08);border-color:rgba(244,63,94,0.35)"><span class="dot" style="background:#f43f5e"></span><span class="pname" style="color:#f43f5e">event</span><span class="pmeta">7 · 事件</span></div>
  <div class="pillar" style="background:rgba(79,70,229,0.08);border-color:rgba(79,70,229,0.35)"><span class="dot" style="background:#4f46e5"></span><span class="pname" style="color:#4f46e5">risk ★</span><span class="pmeta">6 · 風險</span></div>
  <div class="pillar" style="background:rgba(124,58,237,0.08);border-color:rgba(124,58,237,0.35)"><span class="dot" style="background:#7c3aed"></span><span class="pname" style="color:#7c3aed">chip</span><span class="pmeta">4 · 籌碼</span></div>
  <div class="pillar" style="background:rgba(6,182,212,0.08);border-color:rgba(6,182,212,0.35)"><span class="dot" style="background:#06b6d4"></span><span class="pname" style="color:#06b6d4">ind</span><span class="pmeta">4 · 產業</span></div>
  <div class="pillar" style="background:rgba(14,165,233,0.08);border-color:rgba(14,165,233,0.35)"><span class="dot" style="background:#0ea5e9"></span><span class="pname" style="color:#0ea5e9">txt</span><span class="pmeta">30 · 文本</span></div>
  <div class="pillar" style="background:rgba(236,72,153,0.08);border-color:rgba(236,72,153,0.35)"><span class="dot" style="background:#ec4899"></span><span class="pname" style="color:#ec4899">sent</span><span class="pmeta">7 · 情緒</span></div>
</div>
</body></html>
