<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.hero {
  position: relative; padding: 22px 24px; border-radius: 18px;
  background:
    radial-gradient(ellipse at 10% 10%, rgba(37,99,235,.12) 0%, transparent 60%),
    radial-gradient(ellipse at 90% 90%, rgba(124,58,237,.12) 0%, transparent 60%),
    linear-gradient(135deg,#fff,#f8fafc);
  border: 1px solid var(--gl-border);
  box-shadow: var(--gl-shadow-md);
  overflow: hidden;
}
.hero::before { content:""; position:absolute; top:-50%; right:-20%; width:400px; height:400px;
  background: radial-gradient(circle, rgba(37,99,235,.08), transparent 70%); filter: blur(40px); }
.eb { display:inline-block; padding:3px 10px; background: rgba(37,99,235,.08); color:#2563eb;

  font-family: var(--gl-font-mono); }
.title { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; margin: 0;
  background: linear-gradient(135deg,#0f172a 0%,#2563eb 55%,#7c3aed 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 12px; color: var(--gl-text-2); line-height: 1.55; margin-top: 6px; }

<div class="hero">
  <div class="eb">TAIWAN STOCK · MULTI-FACTOR PREDICTION</div>
  <div class="title">台股多因子預測決策輔助系統</div>

</div>
</body></html>
