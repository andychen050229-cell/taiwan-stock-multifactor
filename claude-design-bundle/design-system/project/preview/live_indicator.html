<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.live { display: inline-flex; align-items: center; gap: 8px; padding: 4px 10px;
  background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.25);
  border-radius: 999px; font-size: 12px; font-weight: 700; color: #10b981;
  letter-spacing: .05em; text-transform: uppercase;
  font-family: var(--gl-font-mono); }
.live::before { content:""; width:8px; height:8px; border-radius:50%; background:#10b981;
  box-shadow: 0 0 0 0 rgba(16,185,129,.6); animation: gl-pulse 2s cubic-bezier(.4,0,.6,1) infinite; }
@keyframes gl-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(16,185,129,.6); }
  70%  { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
  100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}
.r{display:flex;gap:10px;align-items:center;padding:16px;flex-wrap:wrap;}
</style></head><body>
<div class="r">
  <span class="live">phase 1-6 · all gates passed</span>
  <span class="live" style="color:#2563eb;background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.25);">live · research snapshot</span>
</div>
<div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-text-3);padding:0 16px 16px;">gl-live · 2s cubic-bezier(.4,0,.6,1) infinite · only approved keyframe</div>
</body></html>
