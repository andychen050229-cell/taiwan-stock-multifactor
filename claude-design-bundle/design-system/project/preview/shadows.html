<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.row-sh { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 8px; }
.card-sh {
  background: #fff; border: 1px solid var(--gl-border); border-radius: 14px;
  padding: 14px; height: 80px; display:flex; flex-direction:column; justify-content:space-between;
}
.card-sh .n { font-family: var(--gl-font-mono); font-size: 11px; font-weight: 600; }
.card-sh .d { font-family: var(--gl-font-mono); font-size: 9px; color: var(--gl-text-3); }
</style></head><body style="padding:12px;">
<div class="row-sh">
  <div class="card-sh" style="box-shadow:0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);"><div class="n">shadow-sm</div><div class="d">card rest</div></div>
  <div class="card-sh" style="box-shadow:0 4px 6px rgba(15,23,42,.04), 0 10px 15px rgba(15,23,42,.06);"><div class="n">shadow-md</div><div class="d">hero · panel</div></div>
  <div class="card-sh" style="box-shadow:0 10px 15px rgba(15,23,42,.06), 0 20px 25px rgba(15,23,42,.08);"><div class="n">shadow-lg</div><div class="d">modal · popover</div></div>
  <div class="card-sh" style="box-shadow:0 0 0 1px rgba(37,99,235,.08), 0 8px 30px rgba(37,99,235,.12); border-color: rgba(37,99,235,0.35);"><div class="n">shadow-glow</div><div class="d">hover state</div></div>
</div>
</body></html>
