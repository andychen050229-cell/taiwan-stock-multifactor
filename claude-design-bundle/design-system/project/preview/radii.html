<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.box { width: 72px; height: 52px; background: linear-gradient(135deg,#2563eb,#7c3aed); display:flex; align-items:end; justify-content:center; padding:4px; color:white; font-family:var(--gl-font-mono); font-size:10px; font-weight:600; }
.row-r { display:flex; gap:12px; align-items:end; }
.item { text-align:center; font-family:var(--gl-font-mono); font-size:10px; color:var(--gl-text-3); }
.item .name { color: var(--gl-text); font-weight:600; margin-top:4px; }
</style></head><body style="padding:20px;">
<div class="row-r">
  <div class="item"><div class="box" style="border-radius:6px">6</div><div class="name">r-xs</div><div>6px</div></div>
  <div class="item"><div class="box" style="border-radius:8px">8</div><div class="name">r-sm</div><div>8px</div></div>
  <div class="item"><div class="box" style="border-radius:10px">10</div><div class="name">r-md</div><div>10px · boxes</div></div>
  <div class="item"><div class="box" style="border-radius:14px">14</div><div class="name">r-lg</div><div>14px · cards</div></div>
  <div class="item"><div class="box" style="border-radius:18px">18</div><div class="name">r-xl</div><div>18px · hero</div></div>
  <div class="item"><div class="box" style="border-radius:999px">pill</div><div class="name">r-pill</div><div>999px · chips</div></div>
</div>
</body></html>
