<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>TSMF · 台股多因子情報終端</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* Font-loaded gate — prevents FOIT/FOUT substitution flash */
  html.fonts-loading body{opacity:.01}
  html.fonts-ready body{opacity:1;transition:opacity .18s ease-out}
</style>
<script>
  document.documentElement.classList.add('fonts-loading');
  if (document.fonts && document.fonts.ready) {
    Promise.all([
      document.fonts.load('700 1rem "Inter"'),
      document.fonts.load('800 1rem "Inter"'),
      document.fonts.load('700 1rem "JetBrains Mono"'),
      document.fonts.load('700 1rem "Noto Sans TC"'),
    ]).then(()=>{
      document.documentElement.classList.remove('fonts-loading');
      document.documentElement.classList.add('fonts-ready');
    }).catch(()=>{
      document.documentElement.classList.remove('fonts-loading');
      document.documentElement.classList.add('fonts-ready');
    });
    setTimeout(()=>{document.documentElement.classList.remove('fonts-loading');document.documentElement.classList.add('fonts-ready');}, 2500);
  } else {
    document.documentElement.classList.add('fonts-ready');
  }
</script>

<template id="__bundler_thumbnail" data-bg-color="#fafbfc">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="tg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs>
    <rect width="1200" height="800" fill="#fafbfc"/>
    <circle cx="600" cy="400" r="220" fill="none" stroke="url(#tg)" stroke-width="6"/>
    <circle cx="600" cy="400" r="150" fill="none" stroke="url(#tg)" stroke-width="3" opacity=".4"/>
    <text x="600" y="420" font-family="Inter,sans-serif" font-size="96" font-weight="900" text-anchor="middle" fill="url(#tg)">TSMF</text>
  </svg>
</template>

<style>
:root{
  --bg:#fafbfc; --surface:#ffffff; --subtle:#f1f5f9; --tint:#f8fafc;
  --overlay:rgba(255,255,255,.72);
  --bd:#e2e8f0; --bd-str:#cbd5e1;
  --fg:#0f172a; --fg2:#475569; --fg3:#94a3b8; --mut:#cbd5e1;
  --blue:#2563eb; --violet:#7c3aed; --cyan:#06b6d4;
  --emerald:#10b981; --amber:#f59e0b; --rose:#f43f5e; --indigo:#4f46e5; --sky:#0ea5e9; --pink:#ec4899;
  --up:#10b981; --dn:#f43f5e;
  --grad-pri:linear-gradient(135deg,#2563eb 0%,#7c3aed 100%);
  --grad-tech:linear-gradient(135deg,#06b6d4 0%,#2563eb 50%,#7c3aed 100%);
  --grad-ok:linear-gradient(135deg,#10b981 0%,#06b6d4 100%);
  --grad-warm:linear-gradient(135deg,#f59e0b 0%,#f43f5e 100%);
  --shadow-sm:0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  --shadow-md:0 4px 6px rgba(15,23,42,.04), 0 10px 15px rgba(15,23,42,.06);
  --shadow-glow:0 0 0 1px rgba(37,99,235,.08), 0 8px 30px rgba(37,99,235,.12);
  --sans:'Inter','Noto Sans TC',-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei','PingFang TC','Hiragino Sans TC',sans-serif;
  --mono:'JetBrains Mono','Noto Sans TC','SF Mono',Consolas,'Liberation Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  font-family:var(--sans); color:var(--fg); background:var(--bg);
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"tnum" 1; overflow-x:hidden;
}
.mono,code{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
button{font-family:inherit;cursor:pointer;border:none;background:transparent}
a{color:inherit;text-decoration:none}

/* ===== Tech-grid bg + ambient radial ===== */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(37,99,235,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(37,99,235,.025) 1px,transparent 1px);
  background-size:40px 40px;
}
body::after{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 900px 500px at 8% -5%, rgba(37,99,235,.08), transparent 60%),
    radial-gradient(ellipse 700px 400px at 95% 10%, rgba(124,58,237,.07), transparent 55%);
}

/* ===== LAYOUT: sidebar + main ===== */
.app{position:relative;z-index:1;display:grid;grid-template-columns:240px 1fr;min-height:100vh}

/* ===== SIDEBAR (dark, like 財報狗 left rail but glint-dark) ===== */
.side{
  background:linear-gradient(180deg,#0f1419 0%,#1a2332 100%);
  border-right:1px solid #1e293b;
  padding:18px 16px; position:sticky; top:0; height:100vh; overflow-y:auto;
  color:#cbd5e1;
}
.side::-webkit-scrollbar{width:4px}
.side::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.brand{display:flex;align-items:center;gap:10px;padding:6px 6px 14px;border-bottom:1px solid #1e293b;margin-bottom:14px}
.brand-mk{
  width:38px;height:38px;border-radius:10px;background:var(--grad-pri);
  display:grid;place-items:center;font-weight:900;color:#fff;font-size:17px;
  box-shadow:0 4px 14px rgba(37,99,235,.35), inset 0 0 0 1px rgba(255,255,255,.15);
}
.brand-t{font-size:14px;font-weight:800;color:#fff;letter-spacing:0}
.brand-s{font-family:var(--mono);font-size:9px;color:#64748b;letter-spacing:.14em;margin-top:3px;text-transform:uppercase;font-weight:700}

.side-sec{margin:14px 0 6px;padding:0 8px}
.side-sec .lbl{font-family:var(--mono);font-size:9.5px;color:#64748b;letter-spacing:.12em;text-transform:uppercase;font-weight:700}
.side-nav{display:flex;flex-direction:column;gap:1px}
.side-nav button{
  display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;
  color:#94a3b8;font-size:13px;font-weight:500;text-align:left;width:100%;
  transition:all .15s;position:relative;
}
.side-nav button:hover{background:rgba(37,99,235,.08);color:#e2e8f0}
.side-nav button.on{
  background:linear-gradient(90deg,rgba(37,99,235,.18),rgba(124,58,237,.08));
  color:#fff;
  box-shadow:inset 3px 0 0 var(--cyan);
}
.side-nav button .ic{width:18px;font-size:14px;display:grid;place-items:center;color:#64748b}
.side-nav button.on .ic{color:var(--cyan)}
.side-nav button .n{margin-left:auto;font-family:var(--mono);font-size:10px;color:#475569;padding:1px 6px;background:rgba(255,255,255,.04);border-radius:99px}
.side-nav button.on .n{color:var(--cyan);background:rgba(6,182,212,.12)}

.side-card{margin:20px 8px 10px;padding:14px;background:linear-gradient(180deg,rgba(37,99,235,.08),rgba(124,58,237,.04));border:1px solid rgba(37,99,235,.15);border-radius:12px}
.sc-hd{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:9.5px;color:#94a3b8;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:10px}
.sc-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);box-shadow:0 0 0 0 rgba(16,185,129,.7);animation:pulse 2s infinite}
.sc-metric{display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.sc-ring{position:relative;width:60px;height:60px;flex-shrink:0}
.sc-ring .sc-pct{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:11px;font-weight:800;color:#e2e8f0}
.sc-txt .sc-v{font-family:var(--mono);font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.01em;line-height:1}
.sc-txt .sc-l{font-size:10.5px;color:#94a3b8;margin-top:4px;font-weight:500}
.sc-stats{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.sc-row{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:10px}
.sc-row span{color:#64748b;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.sc-row b{color:#cbd5e1;font-weight:700}
.side-foot{margin-top:auto;padding:14px 8px 4px;border-top:1px solid #1e293b}
.sf-l{font-family:var(--mono);font-size:9px;color:#475569;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
.sf-v{font-size:11px;color:#cbd5e1;margin-top:4px;font-weight:700}
.sf-actions{display:flex;gap:6px;margin-top:10px}
.sf-b{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:7px;color:#94a3b8;font-size:11px;font-weight:600;transition:all .15s}
.sf-b:hover{background:rgba(37,99,235,.12);border-color:rgba(37,99,235,.3);color:#cbd5e1}
.sf-b span{font-family:var(--mono);color:var(--cyan)}

/* ===== TOP BAR ===== */
.top{
  position:sticky;top:0;z-index:30;
  height:56px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:20px;
  padding:0 28px;
  background:rgba(255,255,255,.85);backdrop-filter:blur(14px) saturate(1.1);
  border-bottom:1px solid var(--bd);
}
.crumb{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--fg3);letter-spacing:.04em}
.crumb b{color:var(--fg);font-weight:600}
.crumb .sep{color:var(--mut)}
.search{
  max-width:520px;width:100%;justify-self:center;
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--bd);border-radius:10px;padding:8px 14px;
  transition:all .2s;
}
.search:focus-within{border-color:var(--blue);box-shadow:var(--shadow-glow)}
.search input{flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--fg)}
.search input::placeholder{color:var(--fg3)}
.search .kbd{font-family:var(--mono);font-size:10px;color:var(--fg3);padding:2px 6px;border:1px solid var(--bd);border-radius:4px;background:var(--subtle)}
.search .ic{color:var(--fg3);font-size:14px}

.top-r{display:flex;align-items:center;gap:14px}
.live{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;color:var(--emerald);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--emerald);box-shadow:0 0 0 0 rgba(16,185,129,.7);animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.7)}50%{box-shadow:0 0 0 8px rgba(16,185,129,0)}}
.clock{font-family:var(--mono);font-size:12px;color:var(--fg);font-weight:600}
.clock .d{color:var(--fg3);margin-right:6px}

/* ===== MODE TABS (top-level: 觀察台 / 研究工作站) ===== */
.mode-seg{
  display:inline-flex;padding:3px;background:var(--subtle);border:1px solid var(--bd);border-radius:10px;gap:2px;
}
.mode-seg button{
  padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;color:var(--fg2);
  letter-spacing:.02em;display:inline-flex;align-items:center;gap:6px;transition:all .2s;
}
.mode-seg button.on{background:var(--surface);color:var(--blue);box-shadow:var(--shadow-sm)}
.mode-seg .mi{font-size:13px}

/* ===== TICKER TAPE (below top bar) ===== */
.tape{
  position:sticky;top:56px;z-index:29;height:30px;overflow:hidden;
  background:var(--surface);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;font-family:var(--mono);font-size:11px;
}
.tape-lbl{
  flex-shrink:0;height:100%;display:flex;align-items:center;gap:7px;padding:0 14px;
  background:linear-gradient(90deg,rgba(37,99,235,.07),transparent);
  border-right:1px solid var(--bd);font-weight:700;color:var(--blue);letter-spacing:.1em;font-size:10px;
}
.tape-lbl::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--emerald);box-shadow:0 0 0 0 rgba(16,185,129,.7);animation:pulse 2s infinite}
.tape-track{flex:1;overflow:hidden;height:100%;position:relative}
.tape-inner{display:flex;align-items:center;gap:24px;height:100%;white-space:nowrap;animation:tslide 90s linear infinite;padding-left:28px}
@keyframes tslide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tk{display:inline-flex;align-items:center;gap:6px;color:var(--fg2)}
.tk b{color:var(--fg);font-weight:700}
.tk .up{color:var(--up);font-weight:600}.tk .dn{color:var(--dn);font-weight:600}
.tk::after{content:"";display:inline-block;width:1px;height:12px;background:var(--mut);margin-left:16px}

/* ===== MAIN STAGE ===== */
.stage{padding:22px 28px 60px;max-width:1680px;margin:0 auto}

/* ===== HERO ===== */
.hero{
  background:var(--surface);border:1px solid var(--bd);border-radius:20px;
  padding:28px 32px; margin-bottom:22px; position:relative; overflow:hidden;
  box-shadow:var(--shadow-md);
}
.hero::before{
  content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--grad-tech);
  background-size:200% 100%;animation:scan 6s linear infinite;
}
@keyframes scan{from{background-position:0 0}to{background-position:200% 0}}
.hero-grid{display:grid;grid-template-columns:1.3fr .9fr;gap:32px;align-items:center}

.hero-eye{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 10px;background:var(--subtle);border:1px solid var(--bd);border-radius:99px;color:var(--fg2);letter-spacing:.06em;text-transform:uppercase}
.chip.blue{background:rgba(37,99,235,.06);border-color:rgba(37,99,235,.2);color:var(--blue)}
.chip.em{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.2);color:var(--emerald)}
.chip.am{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2);color:var(--amber)}
.chip.vi{background:rgba(124,58,237,.06);border-color:rgba(124,58,237,.2);color:var(--violet)}

.hero-title{
  font-size:2.3rem;font-weight:900;letter-spacing:-0.03em;line-height:1.08;
  background:var(--grad-pri);-webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:10px;
}
.hero-sub{font-size:14.5px;color:var(--fg2);line-height:1.65;max-width:620px}
.hero-sub b{color:var(--fg);font-weight:700}

.hero-kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:22px}
.kpi-h{padding:14px 16px;border:1px solid var(--bd);border-radius:12px;background:var(--tint);position:relative;overflow:hidden}
.kpi-h::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue)}
.kpi-h.em::before{background:var(--emerald)}.kpi-h.am::before{background:var(--amber)}.kpi-h.vi::before{background:var(--violet)}
.kpi-h .lbl{font-family:var(--mono);font-size:10px;color:var(--fg3);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.kpi-h .v{font-family:var(--mono);font-size:1.55rem;font-weight:800;color:var(--fg);letter-spacing:-0.02em;line-height:1}
.kpi-h .v.up{color:var(--up)}.kpi-h .v.dn{color:var(--dn)}.kpi-h .v.blue{color:var(--blue)}.kpi-h .v.vi{color:var(--violet)}
.kpi-h .sub{font-family:var(--mono);font-size:10.5px;color:var(--fg2);margin-top:4px}

/* Hero globe/radial */
.viz{position:relative;height:280px;display:grid;place-items:center}
.globe{position:relative;width:280px;height:280px;display:grid;place-items:center}
.ring{position:absolute;border:1px solid rgba(37,99,235,.2);border-radius:50%;animation:spin 40s linear infinite}
.ring.r1{width:100%;height:100%;border-style:dashed}
.ring.r2{width:78%;height:78%;animation-direction:reverse;animation-duration:28s;border-color:rgba(124,58,237,.2)}
.ring.r3{width:54%;height:54%;animation-duration:22s;border-color:rgba(6,182,212,.25)}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.globe-core{
  position:relative;width:164px;height:164px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(37,99,235,.15), rgba(124,58,237,.1) 50%, transparent 80%);
  border:1px solid rgba(37,99,235,.3);
  display:grid;place-items:center;
  box-shadow:0 12px 40px rgba(37,99,235,.15), inset 0 0 30px rgba(37,99,235,.06);
}
.globe-core .n{font-family:var(--mono);font-size:2.2rem;font-weight:900;background:var(--grad-pri);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-0.02em}
.globe-core .l{font-family:var(--mono);font-size:9.5px;color:var(--fg3);letter-spacing:.14em;text-transform:uppercase;margin-top:4px;font-weight:700}
.pdot{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--emerald);box-shadow:0 0 10px var(--emerald);animation:pdot 2.2s infinite ease-out}
.pdot.a2{background:var(--amber);box-shadow:0 0 10px var(--amber);animation-delay:.6s}
.pdot.a3{background:var(--rose);box-shadow:0 0 10px var(--rose);animation-delay:1.1s}
.pdot.a4{background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation-delay:1.7s}
.pdot.a5{background:var(--violet);box-shadow:0 0 10px var(--violet);animation-delay:.3s}
@keyframes pdot{0%{transform:scale(1);opacity:1}70%{transform:scale(2.5);opacity:0}100%{transform:scale(1);opacity:0}}

/* ===== SECTION ===== */
.sec{display:flex;align-items:center;gap:12px;margin:30px 0 14px}
.sec h2{font-size:1.25rem;font-weight:800;color:var(--fg);letter-spacing:-0.01em;padding-left:14px;position:relative;line-height:1.2}
.sec h2::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:4px;border-radius:4px;background:var(--grad-pri)}
.sec .sub{font-family:var(--mono);font-size:11px;color:var(--fg3);letter-spacing:.04em}
.sec .hr{flex:1;height:1px;background:linear-gradient(90deg,var(--bd),transparent)}
.sec .act{font-family:var(--mono);font-size:11px;color:var(--blue);font-weight:700;letter-spacing:.04em}

/* ===== PANEL ===== */
.panel{
  background:var(--overlay);backdrop-filter:blur(12px);
  border:1px solid var(--bd);border-radius:16px;
  box-shadow:var(--shadow-sm);overflow:hidden;
  transition:all .2s;
}
.panel:hover{border-color:var(--bd-str);box-shadow:var(--shadow-md)}
.p-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--bd);
}
.p-hd .ti{font-size:13px;font-weight:700;color:var(--fg);display:flex;align-items:center;gap:8px}
.p-hd .mt{font-family:var(--mono);font-size:10.5px;color:var(--fg3);letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.p-bd{padding:18px}

/* ===== GRID ===== */
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
.c-3{grid-column:span 3}.c-4{grid-column:span 4}.c-5{grid-column:span 5}.c-6{grid-column:span 6}.c-7{grid-column:span 7}.c-8{grid-column:span 8}.c-9{grid-column:span 9}.c-12{grid-column:span 12}

/* KPI strip */
.strip{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;transition:all .2s;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:var(--grad-tech);opacity:0;transition:opacity .2s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-glow);border-color:rgba(37,99,235,.3)}
.kpi:hover::before{opacity:1}
.kpi .lbl{font-family:var(--mono);font-size:9.5px;color:var(--fg3);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.kpi .v{font-family:var(--mono);font-size:1.5rem;font-weight:800;color:var(--fg);letter-spacing:-0.02em;line-height:1}
.kpi .v.up{color:var(--up)}.kpi .v.dn{color:var(--dn)}.kpi .v.blue{color:var(--blue)}.kpi .v.vi{color:var(--violet)}.kpi .v.am{color:var(--amber)}
.kpi .dlt{font-family:var(--mono);font-size:10.5px;color:var(--fg2);margin-top:5px;display:flex;align-items:center;gap:4px}
.kpi .dlt.up{color:var(--up)}.kpi .dlt.dn{color:var(--dn)}

/* ===== 9 Pillar pills ===== */
.pill{display:inline-block;padding:3px 9px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.pill[data-p="trend"]{background:rgba(37,99,235,.08);color:var(--blue);border:1px solid rgba(37,99,235,.22)}
.pill[data-p="fund"]{background:rgba(16,185,129,.08);color:var(--emerald);border:1px solid rgba(16,185,129,.22)}
.pill[data-p="val"]{background:rgba(245,158,11,.08);color:var(--amber);border:1px solid rgba(245,158,11,.22)}
.pill[data-p="event"]{background:rgba(244,63,94,.06);color:var(--rose);border:1px solid rgba(244,63,94,.22)}
.pill[data-p="risk"]{background:rgba(79,70,229,.08);color:var(--indigo);border:1px solid rgba(79,70,229,.22)}
.pill[data-p="chip"]{background:rgba(124,58,237,.08);color:var(--violet);border:1px solid rgba(124,58,237,.22)}
.pill[data-p="ind"]{background:rgba(6,182,212,.08);color:var(--cyan);border:1px solid rgba(6,182,212,.22)}
.pill[data-p="txt"]{background:rgba(14,165,233,.08);color:var(--sky);border:1px solid rgba(14,165,233,.22)}
.pill[data-p="sent"]{background:rgba(236,72,153,.08);color:var(--pink);border:1px solid rgba(236,72,153,.22)}

/* ===== TABLE ===== */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{
  text-align:left;padding:11px 14px;font-family:var(--mono);font-size:10px;color:var(--fg3);
  font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  background:var(--subtle);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:2;
}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--bd);vertical-align:middle;color:var(--fg)}
.tbl tr{cursor:pointer;transition:background .15s}
.tbl tbody tr:nth-child(even){background:var(--tint)}
.tbl tbody tr:hover{background:rgba(37,99,235,.05)}
.tbl .ticker{font-family:var(--mono);font-weight:700;color:var(--blue);font-size:12.5px}
.tbl .name{font-weight:600;font-size:13px}
.tbl .num{font-family:var(--mono);text-align:right;font-weight:600}
.tbl .num.up{color:var(--up)}.tbl .num.dn{color:var(--dn)}
.ind-tag{display:inline-block;padding:2px 8px;background:var(--subtle);border:1px solid var(--bd);border-radius:5px;font-size:11px;color:var(--fg2);font-weight:500}

/* Signal strength bar */
.strength{display:inline-flex;gap:2px;align-items:center}
.s-dot{width:5px;height:12px;background:var(--bd);border-radius:1px}
.s-dot.on{background:var(--blue)}
.s-dot.on.strong{background:var(--emerald)}
.s-dot.on.weak{background:var(--amber)}

/* Sig light for 投資觀察台 */
.sig-card{
  display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;
  background:var(--surface);border:1px solid var(--bd);border-radius:14px;
  padding:16px 20px;margin-bottom:10px;transition:all .2s;cursor:pointer;box-shadow:var(--shadow-sm);
}
.sig-card:hover{border-color:rgba(37,99,235,.3);box-shadow:var(--shadow-glow);transform:translateY(-1px)}
.sig-light{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:18px;flex-shrink:0;font-weight:900;font-family:var(--mono)}
.sig-light.g{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(6,182,212,.08));color:var(--emerald);box-shadow:inset 0 0 0 1px rgba(16,185,129,.25)}
.sig-light.y{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(244,63,94,.06));color:var(--amber);box-shadow:inset 0 0 0 1px rgba(245,158,11,.25)}
.sig-light.r{background:linear-gradient(135deg,rgba(244,63,94,.12),rgba(244,63,94,.04));color:var(--rose);box-shadow:inset 0 0 0 1px rgba(244,63,94,.25)}
.sig-main .ti{font-size:14.5px;font-weight:700;color:var(--fg);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sig-main .ti .tk{font-family:var(--mono);font-size:12.5px;color:var(--blue);background:rgba(37,99,235,.06);padding:2px 8px;border-radius:5px;font-weight:700}
.sig-main .desc{font-size:13px;color:var(--fg2);line-height:1.5;margin-top:4px}
.sig-right{text-align:right;font-family:var(--mono);flex-shrink:0}
.sig-right .big{font-size:1.45rem;font-weight:800;line-height:1;letter-spacing:-0.02em}
.sig-right .small{font-size:10.5px;color:var(--fg3);margin-top:4px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}

/* Feed */
.feed{max-height:450px;overflow-y:auto}
.feed::-webkit-scrollbar{width:4px}.feed::-webkit-scrollbar-thumb{background:var(--mut);border-radius:2px}
.feed-item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:flex-start;padding:11px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s}
.feed-item:hover{background:var(--tint)}
.fi-tag{font-family:var(--mono);font-size:9px;font-weight:800;padding:3px 7px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.fi-tag.crit{background:rgba(244,63,94,.1);color:var(--rose);border:1px solid rgba(244,63,94,.22)}
.fi-tag.hi{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.22)}
.fi-tag.med{background:rgba(37,99,235,.08);color:var(--blue);border:1px solid rgba(37,99,235,.22)}
.fi-tag.ok{background:rgba(16,185,129,.08);color:var(--emerald);border:1px solid rgba(16,185,129,.22)}
.fi-tag.low{background:var(--subtle);color:var(--fg2);border:1px solid var(--bd)}
.fi-msg{font-size:12.5px;color:var(--fg);line-height:1.5}
.fi-msg b{color:var(--fg);font-weight:700}
.fi-meta{font-family:var(--mono);font-size:10px;color:var(--fg3);text-align:right;flex-shrink:0;display:flex;flex-direction:column;gap:2px}

/* LOPO bars */
.lopo-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-family:var(--mono);font-size:11.5px}
.lopo-lbl{width:58px;text-align:center;flex-shrink:0}
.lopo-bar{flex:1;height:10px;background:var(--subtle);border-radius:5px;overflow:hidden;position:relative}
.lopo-fill{height:100%;border-radius:5px;transition:width .8s cubic-bezier(.34,1.56,.64,1);background:var(--grad-tech)}
.lopo-val{width:76px;text-align:right;color:var(--fg);font-weight:700}
.lopo-n{width:56px;color:var(--fg3);font-size:10px;text-align:right}

/* Box */
.box{padding:12px 16px;border-radius:10px;border-left:3px solid var(--blue);font-size:12.5px;line-height:1.55;margin:10px 0}
.box.info{background:rgba(37,99,235,.04);color:var(--fg)}
.box.ok{background:rgba(16,185,129,.04);border-color:var(--emerald);color:var(--fg)}
.box.warn{background:rgba(245,158,11,.04);border-color:var(--amber);color:var(--fg)}
.box.danger{background:rgba(244,63,94,.04);border-color:var(--rose);color:var(--fg)}
.box b{font-weight:700}

/* Segmented */
.seg{display:inline-flex;padding:3px;background:var(--subtle);border:1px solid var(--bd);border-radius:8px;gap:2px}
.seg button{padding:6px 12px;border-radius:5px;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--fg2);letter-spacing:.04em;text-transform:uppercase;transition:all .15s}
.seg button.on{background:var(--surface);color:var(--blue);box-shadow:var(--shadow-sm)}

/* Company finger-print radar */
.radar{display:grid;place-items:center;padding:6px}
.stat-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.stat-row .l{flex:1;color:var(--fg2);font-weight:500}
.stat-row .b{flex:1.2;height:8px;background:var(--subtle);border-radius:4px;overflow:hidden;position:relative}
.stat-row .b i{display:block;height:100%;border-radius:4px;background:var(--grad-tech)}
.stat-row .v{width:68px;text-align:right;font-family:var(--mono);font-weight:700;color:var(--fg)}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:3px 8px;background:var(--subtle);border:1px solid var(--bd);border-radius:5px;font-family:var(--mono);font-size:10px;color:var(--fg2);letter-spacing:.02em;font-weight:500}
.tag.ok{background:rgba(16,185,129,.06);color:var(--emerald);border-color:rgba(16,185,129,.2)}
.tag.bad{background:rgba(244,63,94,.06);color:var(--rose);border-color:rgba(244,63,94,.2)}
.tag.warn{background:rgba(245,158,11,.06);color:var(--amber);border-color:rgba(245,158,11,.2)}

/* Drawer */
.drawer-ov{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s;z-index:99}
.drawer-ov.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;width:560px;max-width:95vw;height:100vh;background:var(--surface);border-left:1px solid var(--bd);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:100;overflow-y:auto;box-shadow:-40px 0 60px rgba(15,23,42,.12)}
.drawer.on{transform:translateX(0)}
.dr-hd{padding:22px 26px 18px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--surface);z-index:2}
.dr-bd{padding:22px 26px}

/* Sentiment treemap-like */
.senti{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.senti-cell{padding:14px;border-radius:10px;background:var(--surface);border:1px solid var(--bd)}
.senti-cell .n{font-family:var(--mono);font-size:2rem;font-weight:900;letter-spacing:-0.02em}
.senti-cell .l{font-family:var(--mono);font-size:10px;color:var(--fg3);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.senti-cell .m{font-size:11.5px;color:var(--fg2);margin-top:4px}

/* Keyword cloud */
.kw-cloud{display:flex;flex-wrap:wrap;gap:8px 12px;padding:12px;align-items:center;justify-content:center;min-height:240px}
.kw-cloud span{font-weight:700;letter-spacing:-0.01em;cursor:pointer;transition:all .2s}
.kw-cloud span:hover{filter:brightness(.9)}

/* Feature funnel */
.funnel{display:flex;flex-direction:column;gap:8px;align-items:center;padding:8px}
.funnel .stage{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-radius:10px;color:#fff;font-family:var(--mono);font-weight:800;font-size:13.5px;box-shadow:var(--shadow-sm);transition:all .2s}
.funnel .stage:hover{transform:translateX(4px)}
.funnel .stage .l{opacity:.9;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.funnel .stage .n{font-size:18px}

/* Fold stability */
.fold-row{display:flex;align-items:center;gap:12px;margin:6px 0;font-family:var(--mono);font-size:11.5px}
.fold-row .l{width:52px;color:var(--fg3);font-weight:700}
.fold-row .bar{flex:1;height:10px;background:var(--subtle);border-radius:5px;overflow:hidden;border:1px solid var(--bd)}
.fold-row .bar i{display:block;height:100%;border-radius:5px;background:var(--grad-pri)}
.fold-row .v{width:60px;text-align:right;color:var(--fg);font-weight:800}

/* Histogram */
.hist{display:flex;align-items:flex-end;gap:3px;height:120px;padding:6px 0}
.hist div{flex:1;border-radius:3px 3px 0 0;transition:all .2s}
.hist div:hover{filter:brightness(1.1)}

/* Threshold chart */
.chart{display:block;width:100%;height:auto}
.chart .grid line{stroke:var(--bd);stroke-width:1}

/* Responsive */
@media(max-width:1280px){
  .app{grid-template-columns:200px 1fr}
  .strip{grid-template-columns:repeat(3,1fr)}
  .c-3,.c-4,.c-5,.c-6,.c-7,.c-8,.c-9{grid-column:span 12}
  .hero-grid{grid-template-columns:1fr}
  .viz{height:220px}
}
@media(max-width:840px){
  .app{grid-template-columns:1fr}
  .side{display:none}
  .strip{grid-template-columns:repeat(2,1fr)}
  .stage{padding:16px}
}

/* Hidden-per-mode */
[data-mode="pro"] .only-obs{display:none}
[data-mode="obs"] .only-pro{display:none}

/* Utility */
.flex{display:flex}.ac{align-items:center}.jb{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}.mt-8{margin-top:8px}.mt-14{margin-top:14px}

/* ============ CHART HELPERS ============ */
function multiLine(w,h,series,colors,labels,yUnit='%'){
  const pad={l:44,r:20,t:14,b:34};
  const all=series.flat(); const mn=Math.min(...all,0), mx=Math.max(...all); const rng=mx-mn||1;
  const n=series[0].length;
  const sx=i=>pad.l+i*(w-pad.l-pad.r)/(n-1);
  const sy=v=>h-pad.b-((v-mn)/rng)*(h-pad.t-pad.b);
  const grid=[0,.25,.5,.75,1].map(f=>{const y=pad.t+f*(h-pad.t-pad.b);const v=mx-f*rng;return `<line x1="${pad.l}" x2="${w-pad.r}" y1="${y}" y2="${y}" stroke="var(--bd)" stroke-dasharray="3 3"/><text x="${pad.l-8}" y="${y+3}" text-anchor="end" fill="var(--fg3)" font-family="var(--mono)" font-size="9.5">${v.toFixed(1)}${yUnit}</text>`;}).join('');
  const lines=series.map((s,i)=>{
    const pts=s.map((v,j)=>`${sx(j).toFixed(1)},${sy(v).toFixed(1)}`).join(' ');
    const id='ar'+i+Math.random().toString(36).slice(2,5);
    const a=`${sx(0)},${sy(0)} ${pts} ${sx(n-1)},${sy(0)}`;
    const ar = i===1 ? `<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${colors[i]}" stop-opacity=".18"/><stop offset="1" stop-color="${colors[i]}" stop-opacity="0"/></linearGradient></defs><polygon points="${a}" fill="url(#${id})"/>` : '';
    return `${ar}<polyline points="${pts}" fill="none" stroke="${colors[i]}" stroke-width="${i===1?2.5:1.8}"/><circle cx="${sx(n-1)}" cy="${sy(s[n-1])}" r="3.5" fill="${colors[i]}"/>`;
  }).join('');
  const lg=labels.map((l,i)=>`<g transform="translate(${pad.l+i*150},${h-10})"><rect x="0" y="-8" width="12" height="2.5" fill="${colors[i]}" rx="1"/><text x="16" y="-4" fill="var(--fg2)" font-family="var(--mono)" font-size="10" font-weight="600">${l}</text></g>`).join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${grid}${lines}${lg}</svg>`;
}
function lineArea(w,h,data,color){
  const pad={l:38,r:16,t:12,b:24};
  const mn=Math.min(0,...data), mx=Math.max(...data), rng=mx-mn||1, n=data.length;
  const sx=i=>pad.l+i*(w-pad.l-pad.r)/(n-1);
  const sy=v=>h-pad.b-((v-mn)/rng)*(h-pad.t-pad.b);
  const pts=data.map((v,i)=>`${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(' ');
  const a=`${sx(0)},${sy(mn)} ${pts} ${sx(n-1)},${sy(mn)}`;
  const id='g'+Math.random().toString(36).slice(2,7);
  const zero=mn<0?`<line x1="${pad.l}" x2="${w-pad.r}" y1="${sy(0)}" y2="${sy(0)}" stroke="var(--bd-str)" stroke-dasharray="3 3"/>`:'';
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".25"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    ${zero}<polygon points="${a}" fill="url(#${id})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/>
    <circle cx="${sx(n-1)}" cy="${sy(data[n-1])}" r="3.5" fill="${color}"/>
    <text x="${pad.l-6}" y="${sy(mx)+3}" text-anchor="end" fill="var(--fg3)" font-family="var(--mono)" font-size="9">${mx.toFixed(3)}</text>
    <text x="${pad.l-6}" y="${sy(mn)+3}" text-anchor="end" fill="var(--fg3)" font-family="var(--mono)" font-size="9">${mn.toFixed(3)}</text>
  </svg>`;
}
function gauge(val,min=0.5,max=0.7){
  const pct=Math.max(0,Math.min(1,(val-min)/(max-min)));
  const ang=-180+pct*180; const cx=85,cy=90,r=68;
  const x2=cx+r*Math.cos(ang*Math.PI/180), y2=cy+r*Math.sin(ang*Math.PI/180);
  return `<svg viewBox="0 0 170 110" width="170" height="110">
    <defs><linearGradient id="ga" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${'var(--cyan)'}"/><stop offset=".5" stop-color="${'var(--blue)'}"/><stop offset="1" stop-color="${'var(--violet)'}"/></linearGradient></defs>
    <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" stroke="var(--subtle)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${x2} ${y2}" stroke="url(#ga)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <text x="${cx-r}" y="${cy+18}" text-anchor="middle" fill="var(--fg3)" font-family="var(--mono)" font-size="9.5">${min}</text>
    <text x="${cx+r}" y="${cy+18}" text-anchor="middle" fill="var(--fg3)" font-family="var(--mono)" font-size="9.5">${max}</text>
  </svg>`;
}
function radar(values){ // 9-pillar radar, values {k:0-1}
  const keys=['trend','fund','val','event','risk','chip','ind','txt','sent'];
  const labels={trend:'趨勢',fund:'基本面',val:'估值',event:'事件',risk:'風險',chip:'籌碼',ind:'產業',txt:'文本',sent:'情緒'};
  const cx=140, cy=140, r=95, n=keys.length;
  const pt=(i,f)=>{const a=-Math.PI/2+i*2*Math.PI/n;return [cx+Math.cos(a)*r*f,cy+Math.sin(a)*r*f]};
  const rings=[.25,.5,.75,1].map(f=>{const poly=keys.map((_,i)=>pt(i,f).map(x=>x.toFixed(1)).join(',')).join(' ');return `<polygon points="${poly}" fill="none" stroke="var(--bd)" stroke-width="1"/>`}).join('');
  const axes=keys.map((_,i)=>{const[x,y]=pt(i,1);return `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--bd)" stroke-width="1"/>`}).join('');
  const dataPts=keys.map((k,i)=>{const[x,y]=pt(i,values[k]||0);return `${x.toFixed(1)},${y.toFixed(1)}`}).join(' ');
  const dots=keys.map((k,i)=>{const[x,y]=pt(i,values[k]||0);return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="var(--blue)"/>`}).join('');
  const lbls=keys.map((k,i)=>{const[x,y]=pt(i,1.18);return `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" fill="var(--fg2)" font-family="var(--sans)" font-size="11" font-weight="700" dominant-baseline="central">${labels[k]}</text>`}).join('');
  return `<svg viewBox="0 0 280 280" width="280" height="280">
    <defs><radialGradient id="rg"><stop offset="0" stop-color="rgba(37,99,235,.35)"/><stop offset="1" stop-color="rgba(124,58,237,.15)"/></radialGradient></defs>
    ${rings}${axes}
    <polygon points="${dataPts}" fill="url(#rg)" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round"/>
    ${dots}${lbls}
  </svg>`;
}
function strength(score){
  return `<span class="strength">${Array.from({length:5},(_,i)=>{const on=i<Math.ceil(score/20);const strong=score>=80&&on;const weak=score<50&&on;return `<span class="s-dot ${on?'on':''} ${strong?'strong':''} ${weak?'weak':''}"></span>`}).join('')}</span>`;
}

              <text x="40" y="210" font-family="var(--mono)" font-size="10" fill="var(--fg3)">2024/5</text>
              <text x="380" y="210" text-anchor="end" font-family="var(--mono)" font-size="10" fill="var(--fg3)">2025/3</text>
              <text x="210" y="15" text-anchor="middle" font-family="var(--mono)" font-size="11" font-weight="700" fill="var(--fg2)">累積命中 · 月度階梯</text>
            </svg>
          </div>
        </div>
      </div></div>
    </div>
  `;
}

function viewBacktest(){
  return `
    <div class="sec"><h2>策略回測</h2><span class="sub">三成本情境 · Bootstrap CI · Permutation Test</span><div class="hr"></div></div>
    <div class="strip" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi"><div class="lbl">年化報酬</div><div class="v up mono">+17.77%</div><div class="dlt up">優惠成本 0.356%</div></div>
      <div class="kpi"><div class="lbl">Sharpe</div><div class="v mono">0.81</div><div class="dlt">annualized</div></div>
      <div class="kpi"><div class="lbl">Calmar</div><div class="v mono blue">2.04</div><div class="dlt">return / MDD</div></div>
      <div class="kpi"><div class="lbl">勝率</div><div class="v mono" style="color:var(--emerald)">58.3%</div><div class="dlt">月頻換倉</div></div>
    </div>
    <div class="grid">
      <div class="c-12"><div class="panel">
        <div class="p-hd"><span class="ti">累積報酬 · 三成本情境對照</span><span class="mt">D+20 · 月頻換倉</span></div>
        <div class="p-bd">${multiLine(1240,320,CUMRET,['#f59e0b','#2563eb','#7c3aed'],['Conservative 0.732%','Standard 0.583%','Discount 0.356%'])}</div>
      </div></div>
      <div class="c-6"><div class="panel"><div class="p-hd"><span class="ti">成本敏感度</span><span class="mt">年化 · 3 情境</span></div>
        <div class="p-bd">
          ${[["Discount 0.356%",.1777,"var(--violet)"],["Standard 0.583%",.1383,"var(--blue)"],["Conservative 0.732%",.1194,"var(--amber)"]].map(([n,v,c])=>`
            <div class="stat-row"><div class="l" style="font-weight:600;color:var(--fg)">${n}</div><div class="b"><i style="width:${v*500}%;background:${c}"></i></div><div class="v up">+${(v*100).toFixed(2)}%</div></div>
          `).join('')}
          <div class="box info" style="margin-top:14px;font-size:12px">策略在所有情境下均保持正向報酬 — 證明 edge 足以吸收不同券商費率結構。</div>
        </div>
      </div></div>
      <div class="c-6"><div class="panel"><div class="p-hd"><span class="ti">顯著性檢定</span><span class="mt">Bootstrap + Permutation</span></div>
        <div class="p-bd">
          <table class="tbl" style="margin:-4px 0">
            <thead><tr><th>檢定</th><th style="text-align:right">統計量</th><th>結論</th></tr></thead>
            <tbody>
              <tr><td>Bootstrap 95% CI</td><td class="num">[12.4%, 23.1%]</td><td><span class="tag ok">顯著</span></td></tr>
              <tr><td>Permutation p-value</td><td class="num">&lt; 0.001</td><td><span class="tag ok">極顯著</span></td></tr>
              <tr><td>DSR (Deflated Sharpe)</td><td class="num" style="color:var(--violet);font-weight:800">12.12</td><td><span class="tag ok">PASS ≥ 1.0</span></td></tr>
              <tr><td>SPA 檢定</td><td class="num">0.0032</td><td><span class="tag ok">拒絕 H0</span></td></tr>
            </tbody>
          </table>
        </div>
      </div></div>
    </div>
  `;
}

function viewValuation(){
  return `<div class="sec"><h2>估值與評價</h2><span class="sub">val + event + ind 三支柱整合</span><div class="hr"></div></div>
    ${viewEmpty('估值評價','整合 P/B · P/S · EV/EBITDA · earning yield · 產業中位與 5 年百分位 · 事件驅動 catalyst')}`;
}
function viewChips(){
  return `<div class="sec"><h2>籌碼分析</h2><span class="sub">三大法人 + 融資券 + 大股東</span><div class="hr"></div></div>
    ${viewEmpty('籌碼面','外資 / 投信 / 自營買賣超、融資融券餘額變動、大股東持股變化、集保分點資料')}`;
}
function viewGovernance(){
  return `<div class="sec"><h2>模型治理</h2><span class="sub">Model Card × 6 · 9/9 品質閘門</span><div class="hr"></div></div>
    ${viewEmpty('治理文件','Model Card 詳述用途、訓練資料、度量、偏誤緩解；9/9 品質閘門逐項結果；漂移監控')}`;
}
function viewMonitor(){
  return `<div class="sec"><h2>信號監控</h2><span class="sub">訊號衰減半衰期 · 再訓練建議</span><div class="hr"></div></div>
    ${viewEmpty('信號監控','Rank IC 半衰期追蹤、月度衰減速率、再訓練觸發條件、drift 警示')}`;
}
function viewEmpty(t,d){
  return `<div class="panel"><div class="p-bd" style="padding:48px;text-align:center">
    <div style="font-family:var(--mono);font-size:10px;color:var(--fg3);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:10px">COMING SOON</div>
    <div style="font-size:1.4rem;font-weight:800;color:var(--fg);letter-spacing:-0.02em;margin-bottom:8px">${t}</div>
    <div style="font-size:13px;color:var(--fg2);max-width:600px;margin:0 auto;line-height:1.65">${d}</div>
    <div style="margin-top:18px"><span class="chip blue">方法論已於系統設計手冊 §8 / §9 詳述</span></div>
  </div></div>`;
}

/* ============ RENDER ============ */
const VIEWS={
  home:viewHome, watch:viewWatch, profile:viewProfile, valuation:viewValuation,
  chips:viewChips, text:viewText, model:viewModel, feature:viewFeature,
  backtest:viewBacktest, phase6:viewPhase6, governance:viewGovernance, monitor:viewMonitor
};
const TITLES={
  home:'情報主控台', watch:'觀察清單', profile:'企業體檢', valuation:'估值與評價',
  chips:'籌碼分析', text:'新聞與情緒', model:'模型績效', feature:'特徵工程',
  backtest:'策略回測', phase6:'Phase 6 深度驗證', governance:'模型治理', monitor:'信號監控'
};

function nav(v){
  STATE.nav=v;
  document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('on',b.dataset.nav===v));
  document.getElementById('crumb-1').textContent=TITLES[v];
  render();
  try{localStorage.setItem('tsmf-nav',v)}catch(e){}
}
function setMode(m){
  STATE.mode=m;
  document.body.dataset.mode=m;
  document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));
  render();
  try{localStorage.setItem('tsmf-mode',m)}catch(e){}
}
function setH(h){STATE.horizon=h;render()}
function render(){
  window.scrollTo(0,0);
  document.getElementById('stage').innerHTML = VIEWS[STATE.nav]();
}

function openDr(i){
  const s=STOCKS[i];
  document.getElementById('dr-id').textContent='◉ '+s.id;
  document.getElementById('dr-nm').textContent=s.name;
  document.getElementById('dr-meta').textContent=s.ind+' · NT$ '+s.px.toFixed(2);
  document.getElementById('dr-body').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
      <div class="kpi-h"><div class="lbl">前瞻報酬 D+20</div><div class="v ${s.ret>=0?'up':'dn'}">${s.ret>=0?'+':''}${(s.ret*100).toFixed(2)}%</div></div>
      <div class="kpi-h em"><div class="lbl">模型分數</div><div class="v blue">${s.score}</div></div>
      <div class="kpi-h am"><div class="lbl">毛利率</div><div class="v">${s.gm==null?'—':(s.gm*100).toFixed(1)+'%'}</div></div>
      <div class="kpi-h vi"><div class="lbl">營收 YoY</div><div class="v ${s.yoy>=0?'up':'dn'}">${s.yoy>=0?'+':''}${(s.yoy*100).toFixed(1)}%</div></div>
    </div>
    <div class="mono" style="font-size:10px;color:var(--fg3);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin:16px 0 8px">◢ 九支柱體質雷達</div>
    <div class="radar" style="display:grid;place-items:center">${radar(s.pillars)}</div>
    <div class="mono" style="font-size:10px;color:var(--fg3);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin:16px 0 8px">◢ 模型信號</div>
    <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--tint);border:1px solid var(--bd);border-radius:10px;margin-bottom:14px">
      <div class="sig-light ${s.light}" style="width:40px;height:40px;font-size:16px">${s.light==='g'?'▲':s.light==='y'?'◐':'▼'}</div>
      <div>
        <div style="font-weight:700;color:var(--fg);font-size:14px">${s.sig}</div>
        <div class="mono" style="font-size:11px;color:var(--fg3);margin-top:2px">綜合分數 ${s.score} / 100</div>
      </div>
    </div>
    <div class="mono" style="font-size:10px;color:var(--fg3);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin:16px 0 8px">◢ 模型觀察</div>
    <p style="font-size:13.5px;color:var(--fg);line-height:1.65;margin-bottom:14px">${s.obs}</p>
    <div class="mono" style="font-size:10px;color:var(--fg3);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin:16px 0 8px">◢ 風險摘要</div>
    <p style="font-size:13.5px;color:var(--fg);line-height:1.65">${s.risk}</p>
    <div class="box warn" style="margin-top:20px;font-size:11.5px"><b>重要聲明</b>　歷史回測觀察值 · 非即時行情 · 不構成投資建議</div>
  `;
  document.getElementById('dr').classList.add('on');
  document.getElementById('drOv').classList.add('on');
}
function closeDr(){document.getElementById('dr').classList.remove('on');document.getElementById('drOv').classList.remove('on')}

function renderTicker(){
  const el=document.getElementById('tape');
  const rows=TICKER.map(([id,name,px,chg])=>{
    const cls=chg>=0?'up':'dn';const a=chg>=0?'▲':'▼';
    return `<span class="tk"><b>${id}</b> ${name} <span>${px.toFixed(2)}</span> <span class="${cls}">${a} ${(chg*100).toFixed(2)}%</span></span>`;
  });
  el.innerHTML=rows.join('')+rows.join('');
}
function tick(){
  const d=new Date();const p=n=>String(n).padStart(2,'0');
  const el=document.getElementById('clock');
  if(el) el.innerHTML=`<span class="d">${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}</span>${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

/* ============ BIND ============ */
document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>nav(b.dataset.nav)));
document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));
document.getElementById('drOv').addEventListener('click',closeDr);
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='Escape') closeDr();
});

/* ============ BOOT ============ */
(function(){
  try{
    const sm=localStorage.getItem('tsmf-mode');const sn=localStorage.getItem('tsmf-nav');
    if(sm==='obs'||sm==='pro') STATE.mode=sm;
    if(sn&&VIEWS[sn]) STATE.nav=sn;
  }catch(e){}
  document.body.dataset.mode=STATE.mode;
  document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===STATE.mode));
  document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('on',b.dataset.nav===STATE.nav));
  document.getElementById('crumb-1').textContent=TITLES[STATE.nav];
  renderTicker();setInterval(tick,1000);tick();render();
})();
</script>
</body>
</html>
